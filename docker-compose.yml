# Local observability stack. It is intentionally separate from the EC2
# single-container deployment until a managed monitoring target is configured.
services:
  app:
    build:
      context: .
    image: star-rating-app:local
    container_name: star-rating
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - observability

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: star-rating-nginx-exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://app:8080/stub_status
    depends_on:
      app:
        condition: service_healthy
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: star-rating-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - nginx-exporter
    networks:
      - observability

  grafana:
    image: grafana/grafana:12.3.8-ubuntu
    container_name: star-rating-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env before starting Grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
