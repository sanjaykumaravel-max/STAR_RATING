name: Star Rating CI/CD

on:
  push:
    branches:
      - feature/ui-redesign-phase1

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build React Application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub secrets are available
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "DOCKER_USERNAME is empty"
            exit 1
          fi

          if [ -z "$DOCKER_TOKEN" ]; then
            echo "DOCKER_TOKEN is empty"
            exit 1
          fi

          echo "Docker Hub secrets are present."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            sanjaydev1417/star-rating-app:latest
            sanjaydev1417/star-rating-app:${{ github.sha }}

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull sanjaydev1417/star-rating-app:latest
            docker stop star-rating || true
            docker rm star-rating || true
            docker run -d \
              --name star-rating \
              --restart unless-stopped \
              -p 80:80 \
              sanjaydev1417/star-rating-app:latest
