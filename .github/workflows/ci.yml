name: Star Rating CI

on:
  push:
    branches:
      - feature/ui-redesign-phase1
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build React Application
        run: npm run build

      - name: Build Docker Image
        run: docker build -t star-rating-app .

      - name: Success
        run: echo "CI Build Completed Successfully"